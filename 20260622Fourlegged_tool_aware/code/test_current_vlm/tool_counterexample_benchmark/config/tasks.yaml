tasks:
  - task_id: task_001
    name: multi_bottles_visible_container
    image_dir: images/task_001_multi_bottles_visible_container
    instruction: "卧室里几个同学在打牌，他们有点渴。请尽快把这些水送到卧室。"
    scene_note: "Human annotation only; not used in primary prompts. Kitchen counter with 4-6 bottles or cans and normal household context."
    expected_behavior:
      should_use_tool_or_container: true
      expected_tool_or_container_types: ["tray", "bag", "box", "basket"]
      should_search_for_tool_if_not_visible: false
      expected_trip_pattern: "single_or_few_trips"
      should_avoid_over_tool_use: false
      target_object_terms: ["水", "矿泉水", "水瓶", "bottle", "bottles", "water", "drinks"]
    failure_types:
      - F1_aggregation_failure
      - F3_efficiency_blind_planning
      - F4_container_affordance_miss
    invalid_prompt_leakage_terms: ["托盘", "袋子", "箱子", "容器", "工具"]

