tasks:
  - task_id: task_001
    task_name: multi_bottles_visible_container
    folder: images/task_001_multi_bottles_visible_container
    target_num_images: 3
    queries:
      - "kitchen counter several water bottles tray"
      - "water bottles on kitchen counter tray"
      - "several drinks on table with tray"
      - "water bottles basket kitchen counter"
      - "bottled drinks box kitchen"
    desired_scene: "Several bottles or cans on a kitchen/table counter, with a possible carrying helper such as tray, bag, box, or basket visible."
    avoid:
      - "stock product isolated"
      - "watermark"
      - "people faces"
      - "text-heavy image"

  - task_id: task_002
    task_name: multi_bottles_no_visible_container
    folder: images/task_002_multi_bottles_no_visible_container
    target_num_images: 3
    queries:
      - "several water bottles on kitchen counter"
      - "multiple drink bottles on table"
      - "bottled water kitchen counter"
      - "several bottles on countertop"
      - "drinks on kitchen table"
    desired_scene: "Several bottles or cans visible, but no obvious tray, bag, box, or basket."
    avoid:
      - "visible tray"
      - "visible bag"
      - "visible box"
      - "watermark"

  - task_id: task_003
    task_name: meeting_items_backpack
    folder: images/task_003_meeting_items_backpack
