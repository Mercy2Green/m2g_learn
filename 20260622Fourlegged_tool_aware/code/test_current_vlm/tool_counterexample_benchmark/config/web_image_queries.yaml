      - "items on desk with backpack"
      - "work desk laptop phone charger backpack"
    desired_scene: "Desk with phone, notebook, keys, charger, cup, and a nearby backpack or bag."
    avoid:
      - "people faces"
      - "watermark"
      - "text-heavy image"
      - "isolated product photo"

