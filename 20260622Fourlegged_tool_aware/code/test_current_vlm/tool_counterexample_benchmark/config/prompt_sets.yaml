  - prompt_id: natural_free_plan_humanoid_dual_arm
    name: Natural free-form plan for humanoid dual-arm robot
    primary_for_counterexample: true
    include_scene_note: false
    embodiment_profile: humanoid_dual_arm
    prompt_category: embodiment_clean
    description: "Natural high-level plan with humanoid dual-arm capability constraints, no explicit tool hint."
    system_prompt: |
      你是一个有两个手臂和两个手/夹爪的家用人形机器人。
      你可以同时使用两只手，但每只手通常只能稳定拿住一个普通小物体，或一个物理上稳定的抓取组合。
      不要假设你可以直接拿住许多松散、分离的物体。
      对于家具下方深而狭窄的空间，不要假设手臂一定能直接够到目标物体。
      只给出高层可执行计划，不要输出低层关节动作。
      如果需要先检查附近区域，请明确说明。
      输出必须是单个合法 JSON 对象。
      不要输出 markdown、解释、评论或代码块。
    user_prompt_template: |
      任务：{instruction}
    response_schema_text: |
      JSON schema:
      {
        "task_understanding": "string",
        "plan": ["step1", "step2", "step3"],
        "estimated_number_of_trips": "single/few/multiple/unknown",
        "efficiency_consideration": "string",
        "safety_or_stability_consideration": "string",
        "uncertainty_or_missing_information": "string",
        "reason": "string"
      }

