models:
  - model_id: qwen_default
    provider: qwen
    enabled: true
    model_name: "${QWEN_MODEL}"
    temperature: 0.0
    max_tokens: 1024
    timeout_seconds: 60
    retries: 2

  - model_id: openai_default
    provider: openai
    enabled: false
    model_name: "${OPENAI_MODEL}"
    temperature: 0.0
    max_tokens: 1024
    timeout_seconds: 60
    retries: 2

  - model_id: gemini_default
    provider: gemini
    enabled: false
    model_name: "${GEMINI_MODEL}"
    temperature: 0.0
    max_tokens: 1024
    timeout_seconds: 60
    retries: 2

  - model_id: mock
    provider: mock
    enabled: true
    model_name: "mock"
    temperature: 0.0
    max_tokens: 1024
    timeout_seconds: 5
    retries: 0
