models:
  - model_id: bailian_qwen_vl_plus
    provider: openai_compatible
    provider_label: bailian
    enabled: true
    api_key_env: BAILIAN_API_KEY
    base_url: "${BAILIAN_BASE_URL}"
    model_name: qwen-vl-plus
    strength_role: qwen_main
    temperature: 0.01
    max_tokens: 1024
    timeout_seconds: 60
    retries: 2
    response_format_json: false
    image_transport: data_url
    extra_body: {}

